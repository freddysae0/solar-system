<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System — WebGPU</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e8ff;
    }

    canvas { display: block; }

    /* ── HUD ─────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    /* Top-left: title */
    #title {
      position: absolute;
      top: 22px; left: 24px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.55;
    }

    /* Bottom-left: speed control */
    #controls {
      position: absolute;
      bottom: 24px; left: 24px;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      opacity: 0.75;
    }

    .ctrl-label { width: 100px; letter-spacing: 1px; }

    input[type=range] {
      -webkit-appearance: none;
      width: 140px; height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #7eb8ff;
      cursor: pointer;
    }

    #speed-val { width: 36px; text-align: right; font-size: 11px; opacity: 0.6; }

    /* Bottom-right: legend */
    #legend {
      position: absolute;
      bottom: 24px; right: 24px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 11px;
      opacity: 0.6;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Top-right: planet info tooltip */
    #planet-info {
      position: absolute;
      top: 22px; right: 24px;
      background: rgba(0,8,20,0.78);
      border: 1px solid rgba(120,180,255,0.18);
      border-radius: 8px;
      padding: 14px 18px;
      min-width: 180px;
      font-size: 12px;
      line-height: 1.7;
      display: none;
      backdrop-filter: blur(6px);
    }
    #planet-info h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    #planet-info .stat { opacity: 0.65; }
    #planet-info .val  { float: right; opacity: 0.9; }

    /* Hover cursor hint */
    #hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      opacity: 0.35;
      letter-spacing: 1px;
      pointer-events: none;
    }

    /* WebGPU fallback notice */
    #fallback {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 24px 32px;
      text-align: center;
      font-size: 13px;
      line-height: 1.8;
      max-width: 360px;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-CZmZ_HHm.js"></script>
</head>
<body>
  <div id="hud">
    <div id="title">Solar System · WebGPU</div>

    <div id="planet-info">
      <h3 id="pi-name"></h3>
      <div><span class="stat">Diameter</span><span class="val" id="pi-diam"></span></div>
      <div><span class="stat">Distance</span><span class="val" id="pi-dist"></span></div>
      <div><span class="stat">Year</span><span class="val" id="pi-year"></span></div>
      <div><span class="stat">Moons</span><span class="val" id="pi-moons"></span></div>
    </div>

    <div id="controls">
      <div class="ctrl-row">
        <span class="ctrl-label">TIME SPEED</span>
        <input id="speed-slider" type="range" min="0" max="5" step="0.01" value="1" />
        <span id="speed-val">1×</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">ORBITS</span>
        <input id="orbits-toggle" type="range" min="0" max="1" step="1" value="1" />
        <span id="orbits-val">ON</span>
      </div>
    </div>

    <div id="legend"></div>
    <div id="hint">SCROLL to zoom · DRAG to orbit · CLICK planet for info</div>
  </div>

  <div id="fallback">
    <p>⚠️ WebGPU not available</p>
    <p style="margin-top:8px;opacity:.6">Falling back to WebGL renderer</p>
  </div>

</body>
</html>
